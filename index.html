<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>등장인물</title>
<style>
  /* 전반적인 배경 및 기본 글꼴 설정 */
  body {
    background-color: #0d1117;
    color: #c9d1d9;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    margin: 0;
    padding: 60px 20px;
    line-height: 1.6;
  }

  /* 캐릭터 섹션 전체 컨테이너 */
  .characters-section {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* 상단 제목 */
  .section-header {
    text-align: center;
    margin-bottom: 60px;
  }
  .section-header h2 {
    font-size: 2.5em;
    color: #ff9f43;
    margin-bottom: 15px;
    letter-spacing: 3px;
    font-weight: 800;
  }
  .section-header p {
    color: #8b949e;
    font-size: 1.1em;
    font-weight: 300;
  }

  /* 캐릭터 카드 그리드 */
  .character-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
  }

  /* 캐릭터 카드 개별 항목 스타일 */
  .char-card {
    background-color: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    overflow: hidden;
    width: 450px; /* 카드가 1개이므로 보기 좋은 너비로 고정 */
    max-width: 100%;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .char-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 30px rgba(255, 159, 67, 0.2);
    border-color: #484f58;
  }

  /* 캐릭터 이미지 영역 */
  .char-img {
    width: 100%;
    height: 450px;
    background-color: #21262d;
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .char-img::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to bottom, transparent, #161b22);
  }

  .char-info {
    padding: 30px;
  }

  .char-tags {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .tag {
    padding: 5px 15px;
    border-radius: 25px;
    font-size: 0.85em;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .tag.rank-s { background-color: #ff9f43; color: #000; }
  .tag.role { background-color: #2f3640; color: #f0f6fc; }

  .char-name {
    font-size: 2.2em;
    margin: 0 0 8px 0;
    color: #f0f6fc;
    font-weight: 800;
  }
  .char-subtitle {
    font-size: 0.9em;
    color: #8b949e;
    letter-spacing: 4px;
    margin-bottom: 25px;
  }

  .char-quote {
    font-style: italic;
    color: #c9d1d9;
    border-left: 4px solid #ff9f43;
    padding-left: 20px;
    margin: 0 0 30px 0;
    line-height: 1.8;
  }

  .char-attributes {
    background-color: #0d1117;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 30px;
  }
  .attr-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #21262d;
  }
  .attr-row:last-child { border-bottom: none; }
  .attr-label { color: #8b949e; font-size: 0.95em; }
  .attr-value { color: #ff9f43; font-weight: 600; font-size: 0.95em; text-align: right; }

  .char-desc h4 {
    color: #f0f6fc;
    margin: 0 0 12px 0;
    font-size: 1.3em;
    font-weight: 700;
  }
  .char-desc p {
    color: #8b949e;
    font-size: 1.0em;
    line-height: 1.7;
    margin: 0;
  }
</style>
</head>
<body>

<section class="characters-section">
  <div class="section-header">
    <h2>등장인물</h2>
    <p>대퇴화 시대를 살아가는 바보들을 소개합니다!</p>
  </div>

  <div class="character-grid">
    <div class="char-card">
      <div class="char-img" style="background-image: url('https://i.ifh.cc/j9Jcny.jpg');"></div>
      
      <div class="char-info">
        <div class="char-tags">
          <span class="tag rank-s">IQ 90</span>
          <span class="tag role">대통령</span>
        </div>
        
        <h3 class="char-name">빈 고여</h3>
        <div class="char-subtitle">CHARACTER PROFILE</div>
        
        <div class="char-quote">
          "하하! 내 주먹맛 보고싶지 않아? 대통령한테 맞는걸 영광으로 알라구!"
        </div>
        
        <div class="char-attributes">
          <div class="attr-row">
            <span class="attr-label">성격</span>
            <span class="attr-value">쾌활, 친근, 열정, 순수</span>
          </div>
          <div class="attr-row">
            <span class="attr-label">외모</span>
            <span class="attr-value">청발, 금색 눈동자</span>
          </div>
        </div>
        
        <div class="char-desc">
          <h4>인물 특징</h4>
          <p>현대 문명이 무너진 대퇴화 시대, 가장 높은 지능(IQ 90)을 가진 덕분에 대통령이 된 인물입니다. 힘이 정의라고 믿는 무력파지만, 사실 누구보다 백성들을 아끼는 따뜻한 마음을 가지고 있습니다.</p>
        </div>
      </div>
    </div>
    </div>
</section>

</body>
</html>
